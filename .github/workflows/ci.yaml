on:
  schedule:
    - cron: '0 6 * * *'
  #push:

jobs:
  ci:
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}

    timeout-minutes: 70

    strategy:
      fail-fast: false
      matrix:
        tree:
          # Dev.
          #- rust-dev

          # `rust-next`.
          # ojeda/rust-next
          - rust-next

          # `rust-fixes`.
          # ojeda/rust-fixes
          - rust-fixes

          # 6.14 Next.
          - next

          # 6.13 Mainline.
          - torvalds

          # 6.12 Stable & LTS.
          #- stable-rc/queue/6.12
          - stable-rc/linux-6.12.y
          - stable/linux-6.12.y

          # 6.11 Old Stable.
          #- stable-rc/queue/6.11
          - stable-rc/linux-6.11.y
          - stable/linux-6.11.y

          # 6.6 LTS.
          # stable-rc/queue/6.6
          - stable-rc/linux-6.6.y
          - stable/linux-6.6.y

          # 6.1 LTS.
          # stable-rc/queue/6.1
          - stable-rc/linux-6.1.y
          - stable/linux-6.1.y

        arch:
          - x86_64
          - loongarch64
          - arm64
          - riscv64
          # riscv32
          # arm

        toolchain:
          # From the current Docker image (https://packages.ubuntu.com/jammy/llvm).
          - llvm

          # gcc

          # `distro` uses the one from the current distribution, i.e. using
          # the relevant package manager.
          # distro

          # From LLVM apt (https://apt.llvm.org).
          # llvm-15-llvm-apt
          # llvm-16-llvm-apt
          # llvm-17-llvm-apt
          # llvm-18-llvm-apt
          # llvm-19-llvm-apt

          # From kernel.org (https://mirrors.edge.kernel.org/pub/tools/llvm/).
          # llvm-15-kernel
          # llvm-16-kernel
          # llvm-17-kernel
          # llvm-18-kernel
          # llvm-19-kernel

          # From kernel.org, LLVM+Rust combined toolchains, matching LLVMs (https://mirrors.edge.kernel.org/pub/tools/llvm/rust/).
          # llvmcombined-14-rust-1620-kernel        (6.1  LTS)
          # llvmcombined-17-rust-1730-kernel        (6.6  LTS)
          # llvmcombined-18-rust-1780-kernel        (6.11 Old Stable -- we could use 1.81.0 too but keep this one to test it)
          # llvmcombined-19-rust-1830-kernel        (6.12 Stable & LTS)
          # llvmcombined-19-rust-1830-kernel        (6.13 Mainline)
          # llvmcombined-19-rust-1830-kernel        (6.14 Next)

          # From kernel.org, LLVM+Rust combined toolchains, latest LLVMs within the same major (https://mirrors.edge.kernel.org/pub/tools/llvm/rust/).
          # llvmcombined-14latest-rust-1620-kernel  (6.1  LTS)
          # llvmcombined-17latest-rust-1730-kernel  (6.6  LTS)
          # llvmcombined-18latest-rust-1780-kernel  (6.11 Old Stable -- we could use 1.81.0 too but keep this one to test it)
          # llvmcombined-19latest-rust-1830-kernel  (6.12 Stable & LTS)
          # llvmcombined-19latest-rust-1830-kernel  (6.13 Mainline)
          # llvmcombined-19latest-rust-1830-kernel  (6.14 Next)

          # rustc_codegen_gcc

          # TODO: mixed GCC+LLVM builds.

        config:
          - defconfig
          - defconfig+debug

        output:
          - src
          # subdir
          # outside

        rust:
          # `rustup` means "download from `rustup` the version in `scripts/min-script-version.sh`",
          # i.e. by default we test the minimum version supported by the kernel.
          #
          # `rustup-stable` tests, instead, the latest stable Rust version released. In other words,
          # the other end of the window of stable releases we support.
          - rustup
          # rustup-stable
          # rustup-beta
          # rustup-nightly
          # rustup-1.78.0
          # rustup-1.79.0
          # rustup-1.80.0
          # rustup-1.81.0
          # rustup-1.82.0
          # rustup-1.83.0

          # `distro` uses the one from the current distribution, i.e. using
          # the relevant package manager.
          # distro

          # From kernel.org, LLVM+Rust combined toolchains, matching LLVMs (https://mirrors.edge.kernel.org/pub/tools/llvm/rust/).
          # llvmcombined-14-rust-1620-kernel        (6.1  LTS)
          # llvmcombined-17-rust-1730-kernel        (6.6  LTS)
          # llvmcombined-18-rust-1780-kernel        (6.11 Old Stable)
          # llvmcombined-19-rust-1830-kernel        (6.12 Stable & LTS)
          # llvmcombined-19-rust-1830-kernel        (6.13 Mainline)
          # llvmcombined-19-rust-1830-kernel        (6.14 Next)

          # From kernel.org, LLVM+Rust combined toolchains, latest LLVMs within the same major (https://mirrors.edge.kernel.org/pub/tools/llvm/rust/).
          # llvmcombined-14latest-rust-1620-kernel  (6.1  LTS)
          # llvmcombined-17latest-rust-1730-kernel  (6.6  LTS)
          # llvmcombined-18latest-rust-1780-kernel  (6.11 Old Stable)
          # llvmcombined-19latest-rust-1830-kernel  (6.12 Stable & LTS)
          # llvmcombined-19latest-rust-1830-kernel  (6.13 Mainline)
          # llvmcombined-19latest-rust-1830-kernel  (6.14 Next)

          # disabled

        bindgen:
          # `cargo` means "`cargo install` the version in `scripts/min-script-version.sh`",
          # i.e. by default we test the minimum version supported by the kernel.
          #
          # `cargo-latest` tests, instead, the latest stable `bindgen` version released.
          - cargo
          # cargo-latest

          # `distro` uses the one from the current distribution, i.e. using
          # the relevant package manager.
          # distro

        container:
          - ghcr.io/rust-for-linux/ci
          # archlinux
          # debian:testing
          # debian:sid
          # fedora # Latest release.
          # fedora:40 # A particular release -- this is what we currently test, for all releases, since there are not that many and they do not change often anyway.
          # fedora:41
          # gentoo/stage3
          # nixos/nix # TODO
          # opensuse/slowroll # TODO: no docker image yet?
          # opensuse/tumbleweed
          # ubuntu # Always points to the latest LTS.
          # ubuntu:rolling # Always points to the latest release, whether LTS or not.
          # ubuntu:20.04 # A particular release -- this is what we currently test, for all releases, since there are not that many and they do not change often anyway.
          # ubuntu:22.04
          # ubuntu:24.04
          # ubuntu:24.10 # Non-LTS ("interim") release: oracular.

        include:
          # # `tree: ojeda/rust-next`.
          # - tree: ojeda/rust-next
          #   arch: x86_64
          #   toolchain: llvm
          #   config: defconfig
